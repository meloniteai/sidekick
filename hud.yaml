goal_source: prompt
quiet_period: 25s
verifiers:
    - name: Architect
      type: agent
      direction: "N"
      timeout: 180s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/architect/SKILL.md
    - name: Test
      type: agent
      direction: E
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/test/SKILL.md
    - name: Security
      type: agent
      direction: S
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/security/SKILL.md
    - name: Deployment
      type: agent
      direction: W
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/deployment/SKILL.md
