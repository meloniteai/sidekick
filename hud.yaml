goal_source: prompt
quiet_period: 25s
verifiers:
    - name: Architect
      type: agent
      direction: "N"
      timeout: 180s
      llm:
        agent: claude
        model: sonnet
        thinking: low
        skill: ./skills/architect/SKILL.md
    - name: Test
      type: agent
      direction: E
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/test/SKILL.md
    - name: Security
      type: agent
      direction: S
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/security/SKILL.md
    - name: Deployment
      type: agent
      direction: W
      timeout: 90s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./skills/deployment/SKILL.md
    - name: Dummy
      type: command
      direction: NE
      command:
        - ./verifiers/dummy.sh
      timeout: 5s
    - name: DocsDrift
      type: command
      direction: SE
      command:
        - ./examples/community/docs-drift.sh
      timeout: 30s
      permissions:
        filesystem: read-only
    - name: Lint
      type: binary
      direction: SW
      timeout: 120s
      binary:
        command:
            - ./examples/community/lint.sh
        pass_reason: lint passed
      permissions:
        filesystem: read-only
    - name: Bench
      type: command
      direction: NW
      command:
        - ./examples/community/bench.sh
      timeout: 300s
      permissions:
        filesystem: read-write
    - name: MigrationSafety
      type: agent
      direction: NE
      timeout: 180s
      llm:
        agent: claude
        model: haiku
        thinking: low
        skill: ./examples/community/migration-safety/SKILL.md
      permissions:
        filesystem: read-only
