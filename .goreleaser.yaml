version: 2

project_name: hud

before:
  hooks:
    - go mod tidy

builds:
  - id: hud
    main: .
    binary: hud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT"

release:
  # Owner/name are auto-detected from GITHUB_REPOSITORY (set by GHA) and
  # the git remote. Hardcoding them breaks after a repo rename: GitHub
  # returns 307 on POST uploads to the old name without a Location header,
  # so asset uploads silently fail even though the release object gets
  # created under the new name. Better to trust the env.
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
