name: melonite

on:
  issues:
    types: [opened, reopened, labeled]

permissions: {}

concurrency:
  group: melonite-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  factory:
    name: Run Sidekick issue factory
    if: >-
      ${{
        (
          contains(fromJSON('["opened","reopened"]'), github.event.action)
          && contains(github.event.issue.labels.*.name, 'melonite-gha')
        )
        || (
          github.event.action == 'labeled'
          && github.event.label.name == 'melonite-gha'
        )
      }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: meloniteai/sidekick/.github/workflows/codex-issue-factory.yml@main
    with:
      issue-number: ${{ github.event.issue.number }}
      issue-title: ${{ github.event.issue.title }}
      issue-body: ${{ github.event.issue.body || '' }}
      issue-url: ${{ github.event.issue.html_url }}
      sidekick-config-path: .sidekick/sidekick.yaml
      sidekick-backend-url: https://sidekick.melonite.ai/api
      telemetry-mode: backend
      codex-mode: live
      codex-sandbox: danger-full-access
      publish-mode: live
      sidekick-ref: ${{ github.sha }}
      node-version: "24"
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      SIDEKICK_AUTH_JSON: ${{ secrets.SIDEKICK_AUTH_JSON }}
      MELONITE_GITHUB_TOKEN: ${{ secrets.MELONITE_GITHUB_TOKEN }}
