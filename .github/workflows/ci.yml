name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Configure git identity for tests
        # Several tests (internal/sidekick, internal/ipc, cmd) shell out to
        # `git commit` inside scratch repos to exercise worktree behaviour.
        # CI runners ship with no user.name/email, so the commit fails with
        # "empty ident name". Set a dummy identity globally.
        run: |
          git config --global user.email "ci@sidekick.local"
          git config --global user.name  "sidekick-ci"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Configure git identity for tests
        # The e2e harness shells out to `git init` + `git commit` in scratch
        # repos; CI runners ship without an identity, so configure one.
        run: |
          git config --global user.email "ci@sidekick.local"
          git config --global user.name  "sidekick-ci"
      - name: E2E suite
        # Includes the installer tests (T6/T7), which require Docker.
        # ubuntu-latest runners ship with Docker preinstalled.
        run: make e2e

  e2e-agents:
    name: E2E (agents)
    runs-on: ubuntu-latest
    # Opt-in via the repo-level `RUN_AGENT_E2E` variable. Secrets cannot be
    # referenced from a job-level `if` (GitHub blocks it to prevent secret
    # leakage via expression evaluation), so we gate on a variable instead.
    # Enable in Settings → Secrets and variables → Actions → Variables:
    # set RUN_AGENT_E2E=1 once ANTHROPIC_API_KEY / OPENAI_API_KEY are also
    # configured as secrets.
    if: ${{ vars.RUN_AGENT_E2E == '1' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Install Codex CLI
        run: bash scripts/install-codex-cli
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@sidekick.local"
          git config --global user.name  "sidekick-ci"
      - name: Agent e2e suite
        run: make e2e-agents

  release:
    name: Release
    needs: [test, e2e, e2e-agents]
    # When the Anthropic key is unset, e2e-agents is skipped; we still want
    # release to proceed. When it ran, it must have succeeded.
    if: |
      always()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.test.result == 'success'
      && needs.e2e.result == 'success'
      && (needs.e2e-agents.result == 'success' || needs.e2e-agents.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: gate
        name: Decide whether to release
        run: |
          VERSION="$(tr -d '[:space:]' < version)"
          if [ -z "$VERSION" ]; then
            echo "::error file=version::version file is empty"
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists - no release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing $TAG."
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.release == 'true'
        name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag  "${{ steps.gate.outputs.tag }}"
          git push origin "${{ steps.gate.outputs.tag }}"

      - if: steps.gate.outputs.release == 'true'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - if: steps.gate.outputs.release == 'true'
        id: goreleaser
        name: GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: failure() && steps.gate.outputs.release == 'true' && steps.goreleaser.conclusion == 'failure'
        name: Roll back tag on goreleaser failure
        # Goreleaser expects the tag to already exist when it runs, so we
        # push the tag before invoking it. If goreleaser then fails, the
        # tag is orphaned on origin and permanently blocks that version
        # number from being re-released. Delete it so the next push of
        # the same `version` re-triggers the release cleanly.
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          echo "Rolling back tag $TAG after goreleaser failure..."
          git push origin ":refs/tags/${TAG}" || true
          git tag -d "${TAG}" || true
