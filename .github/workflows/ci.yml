name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Configure git identity for tests
        # Several tests (internal/sidekick, internal/ipc, cmd) shell out to
        # `git commit` inside scratch repos to exercise worktree behaviour.
        # CI runners ship with no user.name/email, so the commit fails with
        # "empty ident name". Set a dummy identity globally.
        run: |
          git config --global user.email "ci@sidekick.local"
          git config --global user.name  "sidekick-ci"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: gate
        name: Decide whether to release
        run: |
          VERSION="$(tr -d '[:space:]' < version)"
          if [ -z "$VERSION" ]; then
            echo "::error file=version::version file is empty"
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists - no release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing $TAG."
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.release == 'true'
        name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag  "${{ steps.gate.outputs.tag }}"
          git push origin "${{ steps.gate.outputs.tag }}"

      - if: steps.gate.outputs.release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - if: steps.gate.outputs.release == 'true'
        id: goreleaser
        name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: failure() && steps.gate.outputs.release == 'true' && steps.goreleaser.conclusion == 'failure'
        name: Roll back tag on goreleaser failure
        # Goreleaser expects the tag to already exist when it runs, so we
        # push the tag before invoking it. If goreleaser then fails, the
        # tag is orphaned on origin and permanently blocks that version
        # number from being re-released. Delete it so the next push of
        # the same `version` re-triggers the release cleanly.
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          echo "Rolling back tag $TAG after goreleaser failure..."
          git push origin ":refs/tags/${TAG}" || true
          git tag -d "${TAG}" || true
